name: Release On Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          if [[ -z "$VERSION" ]]; then
            echo "VERSION file is empty" >&2
            exit 1
          fi
          if [[ ! "$VERSION" =~ ^V[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must follow Vx.x.x format. Current: $VERSION" >&2
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure VERSION changed in this push
        shell: bash
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          if [[ -n "$BEFORE_SHA" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            PREV_VERSION=$(git show "$BEFORE_SHA:VERSION" 2>/dev/null | tr -d '[:space:]' || true)
            CURR_VERSION="${{ steps.version.outputs.value }}"
            if [[ -n "$PREV_VERSION" && "$PREV_VERSION" == "$CURR_VERSION" ]]; then
              echo "VERSION must be incremented on each commit to main. Current: $CURR_VERSION" >&2
              exit 1
            fi
          fi

      - name: Check tag existence
        id: tag_check
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.value }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.tag_check.outputs.exists == 'false'
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.value }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: ${{ steps.version.outputs.value }}
          generate_release_notes: true
